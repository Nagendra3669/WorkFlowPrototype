trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

steps:
- task: AzureCLI@2
  displayName: 'Deploy to Azure Storage'
  inputs:
    azureSubscription: 'azure-first-project'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      az storage account show --name scazureproject --query name --output tsv
      az storage container create \
        --account-name scazureproject \
        --name web \
        --auth-mode login
      az storage blob upload-batch \
        --account-name scazureproject \
        --destination web \
        --source . \
        --overwrite \
        --auth-mode login
